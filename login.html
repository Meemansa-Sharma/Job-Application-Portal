<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – HireConnect</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" type="image/x-icon" href="Logo.png">
</head>
<body class="bg-gray-50 min-h-screen">

  <nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between">
    <a href="index.html" class="text-blue-600 font-semibold text-lg">HireConnect</a>
    <div class="flex gap-3">
      <a href="login.html" class="text-sm border border-gray-300 px-4 py-1.5 rounded-lg bg-gray-100">Login</a>
      <a href="register.html" class="text-sm bg-blue-600 text-white px-4 py-1.5 rounded-lg hover:bg-blue-700">Register</a>
    </div>
  </nav>

  <div class="flex items-center justify-center py-16 px-4">
    <div class="bg-white border border-gray-200 rounded-2xl p-8 w-full max-w-md">

      <h1 class="text-2xl font-semibold mb-1">Log in</h1>
      <p class="text-sm text-gray-500 mb-6">Welcome back to HireConnect</p>

      <div class="flex gap-2 mb-6 p-1 bg-gray-100 rounded-lg">
        <button onclick="setRole('seeker')" id="tab-seeker"
          class="flex-1 text-sm py-1.5 rounded-md bg-white font-medium text-blue-600 shadow-sm">
          Job seeker
        </button>
        <button onclick="setRole('employer')" id="tab-employer"
          class="flex-1 text-sm py-1.5 rounded-md text-gray-500 hover:text-gray-700">
          Employer
        </button>
        <button onclick="setRole('admin')" id="tab-admin"
          class="flex-1 text-sm py-1.5 rounded-md text-gray-500 hover:text-gray-700">
          Admin
        </button>
      </div>

      <form onsubmit="handleLogin(event)">
        <div class="mb-4">
          <label class="block text-sm text-gray-600 mb-1">Email</label>
          <input type="email" id="email" placeholder="you@email.com" required
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300" />
        </div>
        <div class="mb-6">
          <div class="flex justify-between mb-1">
            <label class="text-sm text-gray-600">Password</label>
           
          </div>
          <input type="password" id="password" placeholder="Enter your password" required
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300" />
        </div>
        <p id="error-msg" class="text-red-500 text-sm mb-3 hidden">Incorrect email or password.</p>
        <button type="submit"
          class="w-full bg-blue-600 text-white py-2.5 rounded-lg text-sm font-medium hover:bg-blue-700">
          Log in
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-5">
        No account? <a href="register.html" class="text-blue-600 hover:underline">Register here</a>
      </p>
    </div>
  </div>

  <script>


  let selectedRole = 'seeker'

  function setRole(role) {
    selectedRole = role
    ;['seeker','employer','admin'].forEach(r => {
      const tab = document.getElementById('tab-' + r)
      if (r === role) {
        tab.classList.add('bg-white','font-medium','text-blue-600','shadow-sm')
        tab.classList.remove('text-gray-500')
      } else {
        tab.classList.remove('bg-white','font-medium','text-blue-600','shadow-sm')
        tab.classList.add('text-gray-500')
      }
    })
  }

  async function handleLogin(e) {
    e.preventDefault()
    const email    = document.getElementById('email').value
    const password = document.getElementById('password').value
    const errorMsg = document.getElementById('error-msg')

    errorMsg.classList.add('hidden')

    if (!email || !password) {
      errorMsg.textContent = 'Incorrect email or password.'
      errorMsg.classList.remove('hidden')
      return
    }

    try {
      const res = await fetch('http://localhost:5000/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, role: selectedRole })
      })
      const data = await res.json()

      if (!res.ok) {
        errorMsg.textContent = data.message || 'Login failed.'
        errorMsg.classList.remove('hidden')
        return
      }

      localStorage.setItem('token', data.token)
      localStorage.setItem('user', JSON.stringify(data.user))

      if (data.user.role === 'seeker')   window.location.href = 'pages/seeker-dashboard.html'
      if (data.user.role === 'employer') window.location.href = 'pages/employer-dashboard.html'
      if (data.user.role === 'admin')    window.location.href = 'pages/admin-dashboard.html'

    } catch (err) {
      errorMsg.textContent = 'Could not connect to server. Is the backend running?'
      errorMsg.classList.remove('hidden')
    }
  }
</script>

</body>
</html>
