<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – HireConnect</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- NAVBAR -->
  <nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between">
    <a href="index.html" class="text-blue-600 font-semibold text-lg">HireConnect</a>
    <div class="flex gap-3">
      <a href="login.html" class="text-sm border border-gray-300 px-4 py-1.5 rounded-lg hover:bg-gray-100">Login</a>
      <a href="register.html" class="text-sm bg-blue-600 text-white px-4 py-1.5 rounded-lg">Register</a>
    </div>
  </nav>

  <!-- REGISTER CARD -->
  <div class="flex items-center justify-center py-12 px-4">
    <div class="bg-white border border-gray-200 rounded-2xl p-8 w-full max-w-md">

      <h1 class="text-2xl font-semibold mb-1">Create account</h1>
      <p class="text-sm text-gray-500 mb-6">Join thousands of job seekers and employers</p>

      <!-- ROLE TOGGLE -->
      <div class="flex gap-2 mb-6 p-1 bg-gray-100 rounded-lg">
        <button onclick="setRole('seeker')" id="tab-seeker"
          class="flex-1 text-sm py-1.5 rounded-md bg-white font-medium text-blue-600 shadow-sm">
          Job seeker
        </button>
        <button onclick="setRole('employer')" id="tab-employer"
          class="flex-1 text-sm py-1.5 rounded-md text-gray-500 hover:text-gray-700">
          Employer
        </button>
      </div>

      <!-- FORM -->
      <form onsubmit="handleRegister(event)" id="register-form">

        <!-- Name row -->
        <div class="flex gap-3 mb-4">
          <div class="flex-1">
            <label class="block text-sm text-gray-600 mb-1">First name</label>
            <input type="text" id="firstname" placeholder="name" required
              class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300" />
          </div>
          <div class="flex-1">
            <label class="block text-sm text-gray-600 mb-1">Last name</label>
            <input type="text" id="lastname" placeholder="last name" required
              class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300" />
          </div>
        </div>

        <!-- Email -->
        <div class="mb-4">
          <label class="block text-sm text-gray-600 mb-1">Email</label>
          <input type="email" id="email" placeholder="you@email.com" required
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300" />
        </div>

        <!-- Phone -->
        <div class="mb-4">
          <label class="block text-sm text-gray-600 mb-1">Phone number</label>
          <input type="tel" id="phone" placeholder="9XXXXXXXXX" required
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300" />
        </div>

        <!-- Company name — only visible for employer -->
        <div class="mb-4 hidden" id="company-field">
          <label class="block text-sm text-gray-600 mb-1">Company name</label>
          <input type="text" id="company" placeholder="Infosys, TCS…"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300" />
        </div>

        <!-- Password -->
        <div class="mb-4">
          <label class="block text-sm text-gray-600 mb-1">Password</label>
          <input type="password" id="password" placeholder="Create a password" required
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300" />
          <p class="text-xs text-gray-400 mt-1">At least 8 characters</p>
        </div>

        <!-- Confirm password -->
        <div class="mb-6">
          <label class="block text-sm text-gray-600 mb-1">Confirm password</label>
          <input type="password" id="confirm-password" placeholder="Repeat your password" required
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300" />
        </div>

        <!-- Error message -->
        <p id="error-msg" class="text-red-500 text-sm mb-3 hidden"></p>

        <!-- Success message -->
        <p id="success-msg" class="text-green-600 text-sm mb-3 hidden">
          Account created! Redirecting to login…
        </p>

        <button type="submit"
          class="w-full bg-blue-600 text-white py-2.5 rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors">
          Create account
        </button>

      </form>

      <p class="text-center text-sm text-gray-500 mt-5">
        Already registered?
        <a href="login.html" class="text-blue-600 hover:underline">Log in</a>
      </p>

    </div>
  </div>

  <script>
  let selectedRole = 'seeker'

  function setRole(role) {
    selectedRole = role
    const seekerTab = document.getElementById('tab-seeker')
    const employerTab = document.getElementById('tab-employer')
    const companyField = document.getElementById('company-field')

    if (role === 'seeker') {
      seekerTab.classList.add('bg-white', 'font-medium', 'text-blue-600', 'shadow-sm')
      seekerTab.classList.remove('text-gray-500')
      employerTab.classList.remove('bg-white', 'font-medium', 'text-blue-600', 'shadow-sm')
      employerTab.classList.add('text-gray-500')
      companyField.classList.add('hidden')
    } else {
      employerTab.classList.add('bg-white', 'font-medium', 'text-blue-600', 'shadow-sm')
      employerTab.classList.remove('text-gray-500')
      seekerTab.classList.remove('bg-white', 'font-medium', 'text-blue-600', 'shadow-sm')
      seekerTab.classList.add('text-gray-500')
      companyField.classList.remove('hidden')
    }
  }

  async function handleRegister(e) {
    e.preventDefault()

    const firstname = document.getElementById('firstname').value.trim()
    const lastname  = document.getElementById('lastname').value.trim()
    const email     = document.getElementById('email').value.trim()
    const phone     = document.getElementById('phone').value.trim()
    const password  = document.getElementById('password').value
    const confirm   = document.getElementById('confirm-password').value
    const company   = document.getElementById('company').value.trim()
    const errorMsg   = document.getElementById('error-msg')
    const successMsg = document.getElementById('success-msg')

    errorMsg.classList.add('hidden')
    successMsg.classList.add('hidden')

    if (password.length < 8) {
      errorMsg.textContent = 'Password must be at least 8 characters.'
      errorMsg.classList.remove('hidden')
      return
    }

    if (password !== confirm) {
      errorMsg.textContent = 'Passwords do not match.'
      errorMsg.classList.remove('hidden')
      return
    }

    if (!/^\d{10}$/.test(phone)) {
      errorMsg.textContent = 'Enter a valid 10-digit phone number.'
      errorMsg.classList.remove('hidden')
      return
    }

    try {
      const res = await fetch('http://localhost:5000/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          firstname,
          lastname,
          email,
          phone,
          password,
          role: selectedRole,
          company: selectedRole === 'employer' ? company : ''
        })
      })
      const data = await res.json()

      if (!res.ok) {
        errorMsg.textContent = data.message || 'Registration failed.'
        errorMsg.classList.remove('hidden')
        return
      }

      successMsg.classList.remove('hidden')
      setTimeout(() => {
        window.location.href = 'login.html'
      }, 1500)

    } catch (err) {
      errorMsg.textContent = 'Could not connect to server. Is the backend running?'
      errorMsg.classList.remove('hidden')
    }
  }
</script>

</body>
</html>
