<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Browse Jobs – HireConnect</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../js/auth.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- NAVBAR -->
  <nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between">
    <a href="../index.html" class="text-blue-600 font-semibold text-lg">HireConnect</a>
    <div class="flex gap-3 items-center">
      <a href="browse-jobs.html" class="text-sm text-blue-600 font-medium">Browse Jobs</a>
      <a href="seeker-dashboard.html" class="text-sm text-gray-600 hover:text-blue-600">Dashboard</a>
      <div class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 text-xs font-medium flex items-center justify-center" data-initials> </div>
    </div>
  </nav>

  <!-- SEARCH BAR -->
  <div class="bg-blue-50 border-b border-blue-100 px-6 py-5">
    <div class="max-w-3xl mx-auto flex gap-3">
      <div class="relative flex-1">
        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm">🔍</span>
        <input
          type="text"
          id="search-input"
          placeholder="Job title, skill, or company…"
          oninput="applyFilters()"
          class="w-full pl-9 pr-4 py-2.5 border border-blue-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-300 bg-white"
        />
      </div>
      <select id="loc-filter" onchange="applyFilters()"
        class="px-3 py-2.5 border border-blue-200 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-300 text-gray-600">
        <option value="">All locations</option>
        <option>Bangalore</option>
        <option>Mumbai</option>
        <option>Pune</option>
        <option>Hyderabad</option>
        <option>Delhi</option>
        <option>Chennai</option>
      </select>
      <select id="type-filter" onchange="applyFilters()"
        class="px-3 py-2.5 border border-blue-200 rounded-lg text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-300 text-gray-600">
        <option value="">All types</option>
        <option>Full-time</option>
        <option>Part-time</option>
        <option>Internship</option>
        <option>Remote</option>
      </select>
    </div>
  </div>

  <!-- MAIN LAYOUT -->
  <div class="max-w-6xl mx-auto px-6 py-6 flex gap-6">

    <!-- FILTER SIDEBAR -->
    <aside class="w-48 flex-shrink-0">
      <div class="bg-white border border-gray-200 rounded-xl p-4">

        <div class="mb-5">
          <p class="text-xs font-medium text-gray-400 uppercase tracking-wide mb-3">Experience</p>
          <label class="flex items-center gap-2 py-1 text-sm text-gray-600 cursor-pointer hover:text-gray-900">
            <input type="checkbox" value="Fresher" onchange="applyFilters()" class="accent-blue-600"> Fresher
          </label>
          <label class="flex items-center gap-2 py-1 text-sm text-gray-600 cursor-pointer hover:text-gray-900">
            <input type="checkbox" value="1-3 yrs" onchange="applyFilters()" class="accent-blue-600"> 1–3 years
          </label>
          <label class="flex items-center gap-2 py-1 text-sm text-gray-600 cursor-pointer hover:text-gray-900">
            <input type="checkbox" value="3-5 yrs" onchange="applyFilters()" class="accent-blue-600"> 3–5 years
          </label>
          <label class="flex items-center gap-2 py-1 text-sm text-gray-600 cursor-pointer hover:text-gray-900">
            <input type="checkbox" value="5+ yrs" onchange="applyFilters()" class="accent-blue-600"> 5+ years
          </label>
        </div>

        <div class="mb-5">
          <p class="text-xs font-medium text-gray-400 uppercase tracking-wide mb-3">Skills</p>
          <label class="flex items-center gap-2 py-1 text-sm text-gray-600 cursor-pointer hover:text-gray-900">
            <input type="checkbox" value="React" onchange="applyFilters()" class="accent-blue-600"> React
          </label>
          <label class="flex items-center gap-2 py-1 text-sm text-gray-600 cursor-pointer hover:text-gray-900">
            <input type="checkbox" value="Node.js" onchange="applyFilters()" class="accent-blue-600"> Node.js
          </label>
          <label class="flex items-center gap-2 py-1 text-sm text-gray-600 cursor-pointer hover:text-gray-900">
            <input type="checkbox" value="Python" onchange="applyFilters()" class="accent-blue-600"> Python
          </label>
          <label class="flex items-center gap-2 py-1 text-sm text-gray-600 cursor-pointer hover:text-gray-900">
            <input type="checkbox" value="MongoDB" onchange="applyFilters()" class="accent-blue-600"> MongoDB
          </label>
          <label class="flex items-center gap-2 py-1 text-sm text-gray-600 cursor-pointer hover:text-gray-900">
            <input type="checkbox" value="Figma" onchange="applyFilters()" class="accent-blue-600"> Figma
          </label>
        </div>

        <button onclick="clearFilters()"
          class="w-full text-xs text-gray-500 border border-gray-200 py-1.5 rounded-lg hover:bg-gray-50">
          Clear all
        </button>

      </div>
    </aside>

    <!-- JOB LIST -->
    <div class="flex-1">

      <!-- TOOLBAR -->
      <div class="flex items-center justify-between mb-4">
        <p id="result-count" class="text-sm text-gray-500">Showing 0 jobs</p>
        <div class="flex items-center gap-2">
          <label class="text-xs text-gray-500">Sort by</label>
          <select id="sort-select" onchange="applyFilters()"
            class="text-sm border border-gray-200 rounded-lg px-3 py-1.5 bg-white focus:outline-none text-gray-600">
            <option value="relevant">Most relevant</option>
            <option value="recent">Most recent</option>
            <option value="salary">Highest salary</option>
          </select>
        </div>
      </div>

      <!-- ACTIVE FILTER CHIPS -->
      <div id="chips-row" class="flex flex-wrap gap-2 mb-4 hidden"></div>

      <!-- JOB CARDS -->
      <div id="job-list" class="flex flex-col gap-3"></div>

      <!-- EMPTY STATE -->
      <div id="empty-state" class="hidden text-center py-16 text-gray-400">
        <p class="text-4xl mb-3">🔍</p>
        <p class="font-medium text-gray-600 mb-1">No jobs found</p>
        <p class="text-sm">Try different keywords or clear your filters.</p>
      </div>

    </div>
  </div>

  <script>
    
    let allJobs = []
    let mySkills = []

    function getChecked(name) {
      return [...document.querySelectorAll(`input[value="${name}"]`)]
    }

    function getAllChecked() {
      return [...document.querySelectorAll('input[type=checkbox]:checked')].map(c => c.value)
    }

    function applyFilters() {
      const q       = document.getElementById('search-input').value.toLowerCase()
      const loc     = document.getElementById('loc-filter').value
      const type    = document.getElementById('type-filter').value
      const sort    = document.getElementById('sort-select').value
      const checked = getAllChecked()

      const expFilters   = checked.filter(v => ['Fresher','1-3 yrs','3-5 yrs','5+ yrs'].includes(v))
      const skillFilters = checked.filter(v => ['React','Node.js','Python','MongoDB','Figma'].includes(v))

      let result = allJobs.filter(job => {
        if (q && !job.title.toLowerCase().includes(q) &&
                 !job.company.toLowerCase().includes(q) &&
                 !job.skills.some(s => s.toLowerCase().includes(q))) return false
        if (loc  && job.location !== loc)  return false
        if (type && job.type !== type)     return false
        if (expFilters.length   && !expFilters.includes(job.exp))                     return false
        if (skillFilters.length && !skillFilters.some(s => job.skills.includes(s)))   return false
        return true
      })

      if (sort === 'salary')  result.sort((a, b) => b.salary - a.salary)
      if (sort === 'recent')  result.sort((a, b) => a.posted.localeCompare(b.posted))

      renderChips(q, loc, type, expFilters, skillFilters)
      renderJobs(result)
    }

    function renderJobs(jobs) {
      const list       = document.getElementById('job-list')
      const empty      = document.getElementById('empty-state')
      const countLabel = document.getElementById('result-count')

      countLabel.textContent = `Showing ${jobs.length} job${jobs.length !== 1 ? 's' : ''}`

      if (!jobs.length) {
        list.innerHTML = ''
        empty.classList.remove('hidden')
        return
      }
      empty.classList.add('hidden')

      list.innerHTML = jobs.map(job => {
        const matched = job.skills.filter(s => mySkills.includes(s)).length
        const score   = job.skills.length ? Math.round(matched / job.skills.length * 100) : 0
        const badgeHTML = job.badge === 'new'
          ? `<span class="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-medium">New</span>`
          : job.badge === 'hot'
          ? `<span class="text-xs bg-orange-100 text-orange-600 px-2 py-0.5 rounded-full font-medium">Hot</span>`
          : ''

        return `
        <div onclick="window.location.href='job-detail.html?id=${job.id}'"
          class="bg-white border border-gray-200 rounded-xl p-5 cursor-pointer hover:border-blue-300 transition-colors">

          <div class="flex items-start justify-between gap-3 mb-3">
            <div class="w-10 h-10 rounded-lg bg-gray-100 border border-gray-200 flex items-center justify-center text-xs font-medium text-gray-500 flex-shrink-0">
              ${job.company.slice(0, 2).toUpperCase()}
            </div>
            <div class="flex-1">
              <div class="flex items-center gap-2 mb-0.5">
                <h3 class="font-medium text-gray-900 text-sm">${job.title}</h3>
                ${badgeHTML}
              </div>
              <p class="text-xs text-gray-500">${job.company} &nbsp;·&nbsp; ${job.location} &nbsp;·&nbsp; ${job.type} &nbsp;·&nbsp; ${job.exp}</p>
            </div>
            ${score >= 60
              ? `<span class="text-xs text-green-600 font-medium flex-shrink-0">✦ ${score}% match</span>`
              : ''}
          </div>

          <div class="flex flex-wrap gap-1.5 mb-4">
            ${job.skills.map(s => `
              <span class="text-xs px-2 py-1 rounded ${mySkills.includes(s)
                ? 'bg-green-50 text-green-700 border border-green-200'
                : 'bg-gray-100 text-gray-500'}">
                ${mySkills.includes(s) ? '✓ ' : ''}${s}
              </span>`).join('')}
          </div>

          <div class="flex items-center justify-between pt-3 border-t border-gray-100">
            <span class="text-sm font-medium text-blue-600">${job.salaryLabel}</span>
            <div class="flex items-center gap-3">
              <span class="text-xs text-gray-400">${job.posted}</span>
              <button onclick="event.stopPropagation(); applyToJob('${job.id}')"
                class="text-xs border border-blue-500 text-blue-600 px-3 py-1.5 rounded-lg hover:bg-blue-50">
                Apply
              </button>
            </div>
          </div>

        </div>`
      }).join('')
    }

    function renderChips(q, loc, type, expFilters, skillFilters) {
      const row    = document.getElementById('chips-row')
      const active = []

      if (q)    active.push({ label: `"${q}"`,  clear: () => { document.getElementById('search-input').value = ''; applyFilters() } })
      if (loc)  active.push({ label: loc,        clear: () => { document.getElementById('loc-filter').value  = ''; applyFilters() } })
      if (type) active.push({ label: type,       clear: () => { document.getElementById('type-filter').value = ''; applyFilters() } })

      ;[...expFilters, ...skillFilters].forEach(v => {
        active.push({ label: v, clear: () => {
          document.querySelector(`input[value="${v}"]`).checked = false
          applyFilters()
        }})
      })

      if (!active.length) { row.classList.add('hidden'); return }
      row.classList.remove('hidden')

      row.innerHTML = active.map((c, i) => `
        <span class="flex items-center gap-1 text-xs bg-blue-50 text-blue-700 border border-blue-200 px-3 py-1 rounded-full">
          ${c.label}
          <button onclick="chipClear(${i})" class="text-blue-400 hover:text-blue-700 font-medium">×</button>
        </span>`).join('')
        + `<button onclick="clearFilters()" class="text-xs text-gray-500 border border-gray-200 px-3 py-1 rounded-full hover:bg-gray-100">
            Clear all
           </button>`

      row._clears = active.map(c => c.clear)
    }

    function chipClear(i) {
      document.getElementById('chips-row')._clears[i]()
    }

    function clearFilters() {
      document.getElementById('search-input').value = ''
      document.getElementById('loc-filter').value   = ''
      document.getElementById('type-filter').value  = ''
      document.querySelectorAll('input[type=checkbox]').forEach(c => c.checked = false)
      applyFilters()
    }

    function applyToJob(id) {
      
      window.location.href = `job-detail.html?id=${id}`
    }

    
    async function fetchJobs() {
      const listEl = document.getElementById('job-list')
      listEl.innerHTML = `<p class="text-sm text-gray-400 text-center py-10">Loading jobs…</p>`

      try {
        const res = await fetch('http://localhost:5000/api/jobs')
        if (!res.ok) throw new Error('Failed to load jobs')
        const jobsFromApi = await res.json() // getJobs() returns a plain array

        allJobs = jobsFromApi.map(job => ({
          id: job._id,
          title: job.title,
          company: job.company,
          location: job.location,
          type: job.type,
          exp: job.experience,
          salary: parseInt(String(job.salary).replace(/\D/g, '')) || 0, // for "Highest salary" sort
          salaryLabel: job.salary,          // already a formatted string like "₹8 LPA"
          skills: job.tags || [],
          posted: new Date(job.createdAt).toLocaleDateString(),
          badge: ''
        }))

      
        const user = typeof getUser === 'function' ? getUser() : null
        mySkills = user?.skills || []

        applyFilters()

      } catch (err) {
        listEl.innerHTML = `<p class="text-sm text-red-500 text-center py-10">Couldn't load jobs. Is the backend running?</p>`
      }
    }

    fetchJobs()
  </script>

</body>
</html>
